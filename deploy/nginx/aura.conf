# Nginx reverse proxy for the FloorPlan AI Next.js app.
# Installed to /etc/nginx/sites-available/aura by deploy/scripts/install-nginx.sh.
#
# Notes:
# - client_max_body_size 25m: floor plan image uploads go through /api/upload
#   and Nginx's default 1 MB limit would reject them.
# - proxy_read_timeout 300s: Backboard agent runs can take a while.
# - HTTP only on :80 per the "IP only, no SSL" deploy choice. Add a 443 server
#   block + certbot once a domain is pointed at this box.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
